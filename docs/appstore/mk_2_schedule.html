<!doctype html><html><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1284px;height:2778px;overflow:hidden;}
  .frame{width:1284px;height:2778px;position:relative;
    background:linear-gradient(165deg,#0A1628 0%,#122142 55%,#0A1628 100%);
    font-family:"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif;
    display:flex;flex-direction:column;align-items:center;}
  .copy{padding:150px 100px 0;text-align:center;}
  .eyebrow{font-size:44px;font-weight:800;letter-spacing:8px;color:#E0B96A;margin-bottom:34px;}
  .headline{font-size:96px;font-weight:900;line-height:1.2;color:#F0EAD9;letter-spacing:-2px;}
  .headline .g{color:#F5D98F;}
  .sub{margin-top:40px;font-size:46px;font-weight:600;line-height:1.5;color:rgba(240,234,217,.72);}
  .shot-wrap{margin-top:auto;margin-bottom:-30px;}
  .shot{width:820px;border-radius:56px;box-shadow:0 50px 120px rgba(0,0,0,.5),0 0 0 2px rgba(224,185,106,.14);}
</style></head><body>
  <div class="frame">
    <div class="copy">
      <div class="eyebrow">REVIEW</div>
      <div class="headline">필요한 것만 확정,<br><span class="g">나머진</span> 한 번에</div>
      <div class="sub">슬라이드로 확정·삭제,<br>남은 검토 대기는 한 번에 정리</div>
    </div>
    <div class="shot-wrap"><img class="shot" src="/docs/screenshots/dark/2_schedule.png"></div>
  </div>
</body></html>

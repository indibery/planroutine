<!doctype html><html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1284px; height:2778px; overflow:hidden; }
  .frame {
    width:1284px; height:2778px; position:relative;
    background: linear-gradient(165deg, #F6F8FB 0%, #EAF0F7 55%, #DfE7F2 100%);
    font-family:"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif;
    display:flex; flex-direction:column; align-items:center;
  }
  .copy { padding:150px 110px 0; text-align:center; }
  .eyebrow { font-size:44px; font-weight:800; letter-spacing:8px; color:#9A7415; margin-bottom:34px; }
  .headline { font-size:104px; font-weight:900; line-height:1.18; color:#17253D; letter-spacing:-2px; }
  .headline .g { color:#B8890F; }
  .sub { margin-top:40px; font-size:46px; font-weight:600; line-height:1.5; color:#48566E; }
  .shot-wrap { margin-top:auto; margin-bottom:-30px; position:relative; }
  .shot {
    width:820px; border-radius:56px;
    box-shadow: 0 50px 120px rgba(23,37,61,.28), 0 0 0 2px rgba(23,37,61,.06);
  }
</style></head><body>
  <div class="frame">
    <div class="copy">
      <div class="eyebrow">CALENDAR</div>
      <div class="headline">작년 일정,<br><span class="g">올해로</span> 한 번에</div>
      <div class="sub">나이스 CSV · 행사표 사진으로<br>매년 반복 업무를 빠르게 세팅</div>
    </div>
    <div class="shot-wrap">
      <img class="shot" src="/docs/screenshots/light/1_calendar.png">
    </div>
  </div>
</body></html>

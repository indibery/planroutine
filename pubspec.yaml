name: planroutine
description: "PlanRoutine (플랜루틴) — 계획과 반복, 교사용 일정 관리 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 한국어 로컬라이제이션
  flutter_localizations:
    sdk: flutter

  # 상태 관리
  flutter_riverpod: ^2.6.1

  # 라우팅
  go_router: ^15.1.2

  # 불변 모델
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # 로컬 DB
  sqflite: ^2.4.2
  path: ^1.9.1

  # CSV 파싱
  csv: ^6.0.0

  # 파일 피커
  file_picker: ^9.2.1

  # 날짜 포맷
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 코드 생성
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true

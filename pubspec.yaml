name: planroutine
description: "PlanRoutine (플랜루틴) — 계획과 반복, 교사용 일정 관리 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 한국어 로컬라이제이션
  flutter_localizations:
    sdk: flutter

  # 상태 관리
  flutter_riverpod: ^2.6.1

  # 라우팅
  go_router: ^15.1.2

  # 불변 모델
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # 로컬 DB
  sqflite: ^2.4.2
  path: ^1.9.1

  # CSV 파싱
  csv: ^6.0.0

  # 파일 피커
  file_picker: ^9.2.1

  # 날짜 포맷
  intl: ^0.20.2
  charset_converter: ^2.3.0

  # 온보딩 힌트 표시 여부 영구 저장
  shared_preferences: ^2.3.3

  # 앱 버전/빌드 번호 조회 (설정 화면 앱 정보 섹션)
  package_info_plus: ^8.1.2

  # CSV 내보내기 공유시트 (파일/이메일/에어드롭)
  share_plus: ^10.1.2
  path_provider: ^2.1.5

  # 구글 계정 로그인 (iOS Info.plist에 GIDClientID + URL scheme 설정 필요)
  google_sign_in: ^6.2.1
  # Calendar API + OAuth2 인증 (google_sign_in과 연동)
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 코드 생성
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.5

  # Repository 유닛 테스트용 — in-memory SQLite (FFI)
  sqflite_common_ffi: ^2.3.4+4

flutter:
  uses-material-design: true
